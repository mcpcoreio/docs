<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace">
  <rect width="900" height="300" fill="#0a0a0a" rx="14"/>

  <!-- ── AI Clients box ── -->
  <rect x="20" y="60" width="170" height="180" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="10"/>
  <rect x="20" y="60" width="170" height="36" fill="#1a1a1a" rx="10"/>
  <rect x="20" y="82"  width="170" height="14" fill="#1a1a1a"/>
  <text x="105" y="83" fill="#6b7280" text-anchor="middle" font-size="10" letter-spacing="1.5">AI CLIENTS</text>

  <rect x="36" y="110" width="138" height="28" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="105" y="129" fill="#e2e8f0" text-anchor="middle" font-size="12" font-weight="600">Claude Desktop</text>

  <rect x="36" y="146" width="138" height="28" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="105" y="165" fill="#e2e8f0" text-anchor="middle" font-size="12" font-weight="600">Cursor</text>

  <rect x="36" y="182" width="138" height="28" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="105" y="201" fill="#e2e8f0" text-anchor="middle" font-size="12" font-weight="600">Windsurf / VS Code</text>

  <text x="105" y="240" fill="#6b7280" text-anchor="middle" font-size="10">any MCP-compatible client</text>

  <!-- ── Arrow 1: AI → MCPCore ── -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#7c3aed"/>
    </marker>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <line x1="192" y1="150" x2="256" y2="150" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="224" y="142" fill="#a78bfa" text-anchor="middle" font-size="9" letter-spacing="0.5">MCP</text>

  <!-- ── MCPCore box ── -->
  <rect x="264" y="30" width="280" height="240" fill="#111" stroke="#7c3aed" stroke-width="1.5" rx="12"/>
  <rect x="264" y="30" width="280" height="38" fill="#1a0d3a" rx="12"/>
  <rect x="264" y="54"  width="280" height="14" fill="#1a0d3a"/>
  <text x="404" y="55" fill="#c084fc" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="0.5">MCPCore  ·  MCP Server</text>
  <text x="404" y="72" fill="#7c3aed" text-anchor="middle" font-size="9">your-subdomain.mcpcore.io/mcp</text>

  <!-- Tool rows -->
  <rect x="282" y="84"  width="244" height="32" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="298" y="105" fill="#86efac" font-size="11">⚙  fetch_repo_stats</text>

  <rect x="282" y="124" width="244" height="32" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="298" y="145" fill="#86efac" font-size="11">⚙  query_user_orders</text>

  <rect x="282" y="164" width="244" height="32" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1" rx="5"/>
  <text x="298" y="185" fill="#86efac" font-size="11">⚙  send_slack_message</text>

  <!-- SDK line -->
  <text x="404" y="222" fill="#4b5563" text-anchor="middle" font-size="9.5">sdk.http · sdk.db · env.API_KEY · params</text>

  <!-- Auth badges -->
  <rect x="282" y="232" width="56" height="18" fill="#1a0d3a" stroke="#7c3aed" stroke-width="1" rx="4"/>
  <text x="310" y="245" fill="#a78bfa" text-anchor="middle" font-size="9">Public</text>

  <rect x="344" y="232" width="56" height="18" fill="#1a0d3a" stroke="#7c3aed" stroke-width="1" rx="4"/>
  <text x="372" y="245" fill="#a78bfa" text-anchor="middle" font-size="9">Unlisted</text>

  <rect x="406" y="232" width="56" height="18" fill="#1a0d3a" stroke="#7c3aed" stroke-width="1" rx="4"/>
  <text x="434" y="245" fill="#a78bfa" text-anchor="middle" font-size="9">API Key</text>

  <rect x="468" y="232" width="56" height="18" fill="#1a0d3a" stroke="#7c3aed" stroke-width="1" rx="4"/>
  <text x="496" y="245" fill="#a78bfa" text-anchor="middle" font-size="9">OAuth</text>

  <!-- ── Arrow 2: MCPCore → External ── -->
  <line x1="546" y1="150" x2="606" y2="150" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr2)"/>
  <text x="576" y="142" fill="#60a5fa" text-anchor="middle" font-size="9" letter-spacing="0.5">HTTP</text>

  <!-- ── External Services boxes ── -->
  <rect x="614" y="52"  width="264" height="52" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="746" y="73"  fill="#6b7280" text-anchor="middle" font-size="9" letter-spacing="1.2">EXTERNAL SERVICES</text>
  <text x="746" y="92"  fill="#e2e8f0" text-anchor="middle" font-size="13" font-weight="600">REST APIs</text>

  <rect x="614" y="116" width="264" height="52" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="746" y="148" fill="#e2e8f0" text-anchor="middle" font-size="13" font-weight="600">Databases</text>
  <text x="746" y="163" fill="#4b5563" text-anchor="middle" font-size="9">PostgreSQL · MySQL · MSSQL</text>

  <rect x="614" y="180" width="264" height="52" fill="#111" stroke="#2a2a2a" stroke-width="1" rx="8"/>
  <text x="746" y="212" fill="#e2e8f0" text-anchor="middle" font-size="13" font-weight="600">Any Service</text>
  <text x="746" y="227" fill="#4b5563" text-anchor="middle" font-size="9">Slack · GitHub · Stripe · Custom</text>
</svg>
